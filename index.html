<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>paisa.</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    body { margin: 0; padding: 0; background: #0F0F13; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip,
        ResponsiveContainer, LineChart, Line, CartesianGrid } = Recharts;

const CLIENT_ID  = "198840607286-npt8da6voqh9bf5hqfvd2dnuespr9nph.apps.googleusercontent.com";
const SHEET_ID   = "1L6Zl5PMZTKxWXNJoOmdc2vl_oY6e4Ur8EsNCN2SnQrk";
const SHEET_NAME = "Expenses";
const SCOPES     = "https://www.googleapis.com/auth/spreadsheets";
const DISCOVERY  = "https://sheets.googleapis.com/$discovery/rest?version=v4";

const CATEGORIES = {
  "Food":      { icon: "🍽️", color: "#E8845A", subcategories: ["Groceries", "Eating Out", "Food Delivery"] },
  "Transport": { icon: "🚗", color: "#5A9BE8", subcategories: ["Uber/Cab", "Train/Metro", "Flights"] },
  "Lifestyle": { icon: "🧺", color: "#9B5AE8", subcategories: ["Laundry", "Shopping", "Gifts", "Entertainment", "Subscriptions"] },
  "Financial": { icon: "💰", color: "#5AE8A0", subcategories: ["Insurance", "EMI", "Investments"] },
  "Home":      { icon: "🏠", color: "#E8C45A", subcategories: ["Rent", "Maintenance", "Electricity", "Internet"] },
  "Loans":     { icon: "🏦", color: "#E85A9B", subcategories: ["Personal Loan", "Education Loan", "Lent Money"] },
  "One Time":  { icon: "🛒", color: "#5AE8D4", subcategories: ["Electronics", "Furniture", "Clothing", "Other Purchase"] },
  "Other":     { icon: "📦", color: "#E8D45A", subcategories: ["Miscellaneous", "Donation"] }
};

const fmt     = (n) => "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 0 });
const getNow  = () => new Date().toISOString().split("T")[0];
const MONTHS  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getMonthRange() {
  const n = new Date();
  return {
    start: new Date(n.getFullYear(), n.getMonth(), 1).toISOString().split("T")[0],
    end:   new Date(n.getFullYear(), n.getMonth()+1, 0).toISOString().split("T")[0]
  };
}

function rowToExpense(row, idx) {
  return {
    id: idx + 2, rowIndex: idx + 2,
    date: row[0]||"", category: row[1]||"Other", subcategory: row[2]||"Miscellaneous",
    amount: parseFloat(row[3])||0, note: row[4]||"", reconciled: row[5]==="TRUE"
  };
}
function expenseToRow(e) {
  return [e.date, e.category, e.subcategory, e.amount, e.note, e.reconciled?"TRUE":"FALSE"];
}

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{overscroll-behavior:none}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1A1A22}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
  input,button{font-family:inherit}
  .tab-btn{background:none;border:none;color:#888;font-size:13px;font-weight:500;cursor:pointer;padding:8px 14px;border-radius:20px;transition:all 0.2s}
  .tab-btn.active{background:#1E1E28;color:#F0EDE6}
  .nav-btn{background:none;border:none;color:#666;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;min-width:52px}
  .nav-btn.active{color:#E8845A}
  .nav-btn .ic{font-size:18px}
  .cat-chip{border:1.5px solid #2A2A35;background:#16161E;border-radius:10px;padding:10px 12px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#F0EDE6}
  .cat-chip.active{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 12%,#16161E);color:var(--ac)}
  .sub-chip{border:1.5px solid #2A2A35;background:none;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all 0.18s;font-size:12px;font-weight:500;color:#888}
  .sub-chip.active{border-color:var(--ac);color:var(--ac);background:color-mix(in srgb,var(--ac) 10%,transparent)}
  .amt-inp{background:#1A1A24;border:2px solid #2A2A38;border-radius:14px;color:#F0EDE6;font-size:32px;font-family:'Syne',sans-serif;font-weight:700;width:100%;padding:18px 20px 18px 48px;outline:none;transition:border-color 0.2s}
  .amt-inp:focus{border-color:#E8845A}
  .amt-inp::placeholder{color:#333}
  .txt-inp{background:#1A1A24;border:1.5px solid #2A2A38;border-radius:10px;color:#F0EDE6;font-size:14px;width:100%;padding:12px 16px;outline:none}
  .txt-inp::placeholder{color:#444}
  .date-inp{background:#1A1A24;border:1.5px solid #2A2A38;border-radius:10px;color:#F0EDE6;font-size:14px;padding:10px 14px;outline:none;width:100%;color-scheme:dark}
  .save-btn{width:100%;background:#E8845A;color:#0F0F13;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:'Syne',sans-serif;padding:18px;cursor:pointer;transition:all 0.2s}
  .save-btn:hover{background:#f09070;transform:translateY(-1px)}
  .save-btn.ok{background:#5AE8A0}
  .card{background:#16161E;border:1px solid #1E1E2A;border-radius:16px;padding:18px}
  .erow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #1A1A24}
  .erow:last-child{border-bottom:none}
  .rbtn{background:none;border:1.5px solid #2A2A35;border-radius:20px;color:#888;font-size:12px;font-weight:500;padding:5px 12px;cursor:pointer;transition:all 0.15s}
  .rbtn.active{border-color:#E8845A;color:#E8845A;background:rgba(232,132,90,0.08)}
  .ttip{background:#1E1E2A;border:1px solid #2A2A38;border-radius:8px;padding:8px 12px;font-size:12px;color:#F0EDE6}
  .srch{background:#16161E;border:1.5px solid #2A2A38;border-radius:10px;color:#F0EDE6;font-size:13px;padding:10px 14px;outline:none;width:100%;margin-bottom:14px}
  .srch::placeholder{color:#444}
  .spin{width:18px;height:18px;border:2px solid #2A2A35;border-top-color:#E8845A;border-radius:50%;animation:sp 0.8s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .lbl{font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
`;

function App() {
  const [auth,       setAuth]       = useState("loading"); // loading | need-login | ready | error
  const [authErr,    setAuthErr]    = useState("");
  const [gapiOk,     setGapiOk]    = useState(false);
  const [gisOk,      setGisOk]     = useState(false);
  const tokenRef                    = useRef(null);
  const gapiInitRef                 = useRef(false);

  const [expenses,   setExpenses]   = useState([]);
  const [syncing,    setSyncing]    = useState(false);
  const [syncMsg,    setSyncMsg]    = useState("");
  const [dataLoaded, setDataLoaded] = useState(false);

  const [view,       setView]       = useState("dashboard");
  const [range,      setRange]      = useState("month");
  const [tab,        setTab]        = useState("overview");
  const [search,     setSearch]     = useState("");

  const [cat,  setCat]  = useState("Food");
  const [sub,  setSub]  = useState("Groceries");
  const [amt,  setAmt]  = useState("");
  const [nte,  setNte]  = useState("");
  const [dt,   setDt]   = useState(getNow());
  const [saved,setSaved]= useState(false);

  useEffect(() => { setSub(CATEGORIES[cat].subcategories[0]); }, [cat]);

  // Load scripts once
  useEffect(() => {
    const s1 = document.createElement("script");
    s1.src = "https://apis.google.com/js/api.js";
    s1.onload = () => {
      gapi.load("client", async () => {
        await gapi.client.init({ discoveryDocs: [DISCOVERY] });
        setGapiOk(true);
      });
    };
    document.head.appendChild(s1);

    const s2 = document.createElement("script");
    s2.src = "https://accounts.google.com/gsi/client";
    s2.onload = () => {
      tokenRef.current = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) { setAuthErr(resp.error); setAuth("error"); return; }
          setAuth("ready");
          await doLoad();
        },
      });
      setGisOk(true);
    };
    document.head.appendChild(s2);
  }, []);

  useEffect(() => {
    if (gapiOk && gisOk && !gapiInitRef.current) {
      gapiInitRef.current = true;
      tokenRef.current.requestAccessToken({ prompt: "" });
    }
  }, [gapiOk, gisOk]);

  const signIn = () => {
    setAuth("loading");
    tokenRef.current.requestAccessToken({ prompt: "consent" });
  };

  const flash = (msg) => { setSyncMsg(msg); setTimeout(()=>setSyncMsg(""), 3000); };

  const ensureHeader = async () => {
    const r = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!A1:F1` });
    if (!r.result.values || r.result.values[0]?.[0] !== "Date") {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!A1:F1`, valueInputOption:"RAW",
        resource:{ values:[["Date","Category","Subcategory","Amount","Note","Reconciled"]] }
      });
    }
  };

  const doLoad = useCallback(async () => {
    setSyncing(true);
    try {
      await ensureHeader();
      const r = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!A2:F` });
      const rows = r.result.values || [];
      setExpenses(rows.map(rowToExpense).filter(e=>e.amount>0).sort((a,b)=>b.date.localeCompare(a.date)));
      setDataLoaded(true);
      flash("✓ Synced");
    } catch(e) { flash("⚠ " + (e.result?.error?.message || e.message || "Load error")); }
    finally { setSyncing(false); }
  }, []);

  const handleSave = async () => {
    if (!amt || isNaN(amt) || Number(amt)<=0) return;
    const entry = { id:Date.now(), date:dt, category:cat, subcategory:sub, amount:Number(amt), note:nte.trim(), reconciled:false };
    setExpenses(p=>[entry,...p].sort((a,b)=>b.date.localeCompare(a.date)));
    setAmt(""); setNte(""); setDt(getNow());
    setSaved(true); setTimeout(()=>setSaved(false),1200);
    try {
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!A:F`,
        valueInputOption:"RAW", insertDataOption:"INSERT_ROWS",
        resource:{ values:[expenseToRow(entry)] }
      });
      flash("✓ Saved to Sheet");
    } catch { flash("⚠ Save failed"); }
  };

  const findRow = async (e) => {
    const r = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!A:F` });
    return (r.result.values||[]).findIndex(row =>
      row[0]===e.date && row[1]===e.category && row[2]===e.subcategory &&
      parseFloat(row[3])===e.amount && row[4]===e.note
    );
  };

  const toggleRecon = async (e) => {
    const upd = {...e, reconciled:!e.reconciled};
    setExpenses(p=>p.map(x=>x.id===e.id?upd:x));
    try {
      const ri = await findRow(e);
      if (ri>0) await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:SHEET_ID, range:`${SHEET_NAME}!F${ri+1}`,
        valueInputOption:"RAW", resource:{ values:[[upd.reconciled?"TRUE":"FALSE"]] }
      });
      flash("✓ Updated");
    } catch { flash("⚠ Sync failed"); }
  };

  const deleteExp = async (e) => {
    setExpenses(p=>p.filter(x=>x.id!==e.id));
    try {
      const ri = await findRow(e);
      if (ri>0) {
        const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId:SHEET_ID });
        const sid  = meta.result.sheets.find(s=>s.properties.title===SHEET_NAME)?.properties.sheetId;
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:SHEET_ID,
          resource:{ requests:[{ deleteDimension:{ range:{ sheetId:sid, dimension:"ROWS", startIndex:ri, endIndex:ri+1 }}}]}
        });
      }
      flash("✓ Deleted");
    } catch { flash("⚠ Delete failed"); }
  };

  // ── Derived data ──────────────────────────────────────────────────────────
  const filtered = useMemo(() => {
    if (range==="month") { const {start,end}=getMonthRange(); return expenses.filter(e=>e.date>=start&&e.date<=end); }
    if (range==="week")  { const d=new Date(); d.setDate(d.getDate()-6); return expenses.filter(e=>e.date>=d.toISOString().split("T")[0]); }
    return expenses;
  }, [expenses, range]);

  const total = useMemo(()=>filtered.reduce((s,e)=>s+e.amount,0),[filtered]);

  const byCat = useMemo(()=>{
    const m={};
    for(const e of filtered) m[e.category]=(m[e.category]||0)+e.amount;
    return Object.entries(m).map(([name,value])=>({name,value,color:CATEGORIES[name]?.color||"#888"})).sort((a,b)=>b.value-a.value);
  },[filtered]);

  const bySub = useMemo(()=>{
    const m={};
    for(const e of filtered){ const k=`${e.category}|${e.subcategory}`; if(!m[k]) m[k]={name:e.subcategory,category:e.category,value:0,color:CATEGORIES[e.category]?.color||"#888"}; m[k].value+=e.amount; }
    return Object.values(m).sort((a,b)=>b.value-a.value).slice(0,10);
  },[filtered]);

  const daily = useMemo(()=>{
    const days=[]; const now=new Date();
    for(let i=13;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); const key=d.toISOString().split("T")[0]; days.push({label:`${d.getDate()} ${MONTHS[d.getMonth()]}`,date:key,value:0}); }
    for(const e of expenses){ const f=days.find(d=>d.date===e.date); if(f) f.value+=e.amount; }
    return days;
  },[expenses]);

  const monthly = useMemo(()=>{
    const m={};
    for(const e of expenses){ const d=new Date(e.date); const k=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`; m[k]=(m[k]||0)+e.amount; }
    return Object.entries(m).slice(-12).map(([label,value])=>({label,value}));
  },[expenses]);

  const histList = useMemo(()=>{
    if(!search) return expenses;
    const q=search.toLowerCase();
    return expenses.filter(e=>e.note.toLowerCase().includes(q)||e.subcategory.toLowerCase().includes(q)||e.category.toLowerCase().includes(q));
  },[expenses,search]);

  const rangeLabel = range==="month"?(()=>{const n=new Date();return `${MONTHS[n.getMonth()]} ${n.getFullYear()}`;})():range==="week"?"Last 7 days":"All time";

  // ── Tooltip ───────────────────────────────────────────────────────────────
  const Tip = ({active,payload,label}) => active&&payload?.length
    ? <div className="ttip">{label&&<div style={{color:"#888",marginBottom:2}}>{label}</div>}{fmt(payload[0].value)}</div>
    : null;

  // ── Screens ───────────────────────────────────────────────────────────────
  if (auth==="loading") return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <style>{CSS}</style>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:36}}>paisa<span style={{color:"#E8845A"}}>.</span></div>
      <div className="spin"/>
      <div style={{fontSize:13,color:"#555"}}>Connecting to Google…</div>
    </div>
  );

  if (auth==="need-login" || auth==="error") return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center",gap:12}}>
      <style>{CSS}</style>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:36}}>paisa<span style={{color:"#E8845A"}}>.</span></div>
      <div style={{fontSize:13,color:"#aaa",marginTop:16}}>Sign in with Google to access your private finance data</div>
      {authErr&&<div style={{fontSize:11,color:"#E85A5A"}}>{authErr}</div>}
      <button onClick={signIn} style={{marginTop:16,background:"#E8845A",color:"#0F0F13",border:"none",borderRadius:14,fontSize:15,fontWeight:700,fontFamily:"'Syne',sans-serif",padding:"14px 36px",cursor:"pointer"}}>
        🔐 Sign in with Google
      </button>
    </div>
  );

  // ── Main UI ───────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{CSS}</style>

      {/* Header */}
      <div style={{padding:"20px 20px 0",maxWidth:520,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22}}>paisa<span style={{color:"#E8845A"}}>.</span></div>
            <div style={{fontSize:10,color:"#555",letterSpacing:"1.5px",textTransform:"uppercase"}}>personal finance</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {syncing && <span className="spin"/>}
            {syncMsg  && <span style={{fontSize:11,color:syncMsg.startsWith("✓")?"#5AE8A0":"#E8C45A"}}>{syncMsg}</span>}
            {view==="dashboard" && ["month","week","all"].map(r=>(
              <button key={r} className={`rbtn ${range===r?"active":""}`} onClick={()=>setRange(r)}>
                {r==="month"?"Month":r==="week"?"Week":"All"}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Page */}
      <div style={{maxWidth:520,margin:"0 auto",padding:"16px 20px 110px"}}>

        {/* ── DASHBOARD ── */}
        {view==="dashboard" && <>
          <div style={{marginBottom:20}}>
            <div className="lbl">{rangeLabel}</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:40,letterSpacing:"-1px",lineHeight:1}}>{fmt(total)}</div>
            <div style={{fontSize:13,color:"#555",marginTop:6}}>{filtered.length} transactions</div>
          </div>

          <div style={{display:"flex",gap:4,marginBottom:18,background:"#13131A",borderRadius:24,padding:4}}>
            {["overview","breakdown","trends"].map(t=>(
              <button key={t} className={`tab-btn ${tab===t?"active":""}`} style={{flex:1,textAlign:"center"}} onClick={()=>setTab(t)}>
                {t[0].toUpperCase()+t.slice(1)}
              </button>
            ))}
          </div>

          {!dataLoaded && <div className="card" style={{textAlign:"center",padding:40,color:"#555"}}>
            <span className="spin" style={{marginBottom:12}}/><br/>Loading from Google Sheets…
          </div>}

          {dataLoaded && tab==="overview" && (filtered.length===0
            ? <div className="card" style={{textAlign:"center",padding:40,color:"#555"}}><div style={{fontSize:32,marginBottom:8}}>🌱</div>No expenses for this period</div>
            : <>
              <div className="card" style={{marginBottom:16}}>
                <div className="lbl">By Category</div>
                <div style={{display:"flex",alignItems:"center",gap:16}}>
                  <ResponsiveContainer width={130} height={130}>
                    <PieChart><Pie data={byCat} cx="50%" cy="50%" innerRadius={36} outerRadius={56} dataKey="value" paddingAngle={3}>
                      {byCat.map((e,i)=><Cell key={i} fill={e.color}/>)}
                    </Pie></PieChart>
                  </ResponsiveContainer>
                  <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
                    {byCat.map((c,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:7,height:7,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                          <span style={{fontSize:11,color:"#aaa"}}>{CATEGORIES[c.name]?.icon} {c.name}</span>
                        </div>
                        <span style={{fontSize:11,fontWeight:600}}>{fmt(c.value)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <div className="card">
                <div className="lbl">Recent</div>
                {filtered.slice(0,7).map(e=>(
                  <div key={e.id} className="erow">
                    <div style={{width:34,height:34,borderRadius:10,background:`${CATEGORIES[e.category]?.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{CATEGORIES[e.category]?.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.subcategory}{e.note?` · ${e.note}`:""}</div>
                      <div style={{fontSize:11,color:"#555",marginTop:2}}>{e.date}</div>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,color:CATEGORIES[e.category]?.color}}>{fmt(e.amount)}</div>
                  </div>
                ))}
              </div>
            </>
          )}

          {dataLoaded && tab==="breakdown" && <>
            <div className="card" style={{marginBottom:16}}>
              <div className="lbl">Category Breakdown</div>
              {byCat.length===0 ? <div style={{color:"#555",fontSize:13}}>No data</div> :
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={byCat} layout="vertical" barSize={9}>
                    <XAxis type="number" hide/>
                    <YAxis type="category" dataKey="name" tick={{fill:"#888",fontSize:11}} width={72} tickLine={false} axisLine={false}/>
                    <Tooltip content={<Tip/>}/>
                    <Bar dataKey="value" radius={[0,6,6,0]}>{byCat.map((c,i)=><Cell key={i} fill={c.color}/>)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
              }
            </div>
            <div className="card">
              <div className="lbl">Top Subcategories</div>
              {bySub.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<bySub.length-1?"1px solid #1A1A24":"none"}}>
                  <div><div style={{fontSize:13,fontWeight:500}}>{s.name}</div><div style={{fontSize:11,color:"#555",marginTop:1}}>{s.category}</div></div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:600,color:s.color}}>{fmt(s.value)}</div>
                    <div style={{fontSize:11,color:"#555"}}>{total>0?Math.round(s.value/total*100):0}%</div>
                  </div>
                </div>
              ))}
            </div>
          </>}

          {dataLoaded && tab==="trends" && <>
            <div className="card" style={{marginBottom:16}}>
              <div className="lbl">Daily · Last 14 Days</div>
              <ResponsiveContainer width="100%" height={150}>
                <LineChart data={daily}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1E1E2A"/>
                  <XAxis dataKey="label" tick={{fill:"#555",fontSize:10}} tickLine={false} axisLine={false} interval={3}/>
                  <YAxis hide/>
                  <Tooltip content={<Tip/>}/>
                  <Line type="monotone" dataKey="value" stroke="#E8845A" strokeWidth={2} dot={false} activeDot={{r:4,fill:"#E8845A"}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div className="card">
              <div className="lbl">Monthly Totals</div>
              {monthly.length===0 ? <div style={{color:"#555",fontSize:13}}>Not enough data</div> :
                <ResponsiveContainer width="100%" height={160}>
                  <BarChart data={monthly} barSize={16}>
                    <XAxis dataKey="label" tick={{fill:"#888",fontSize:10}} tickLine={false} axisLine={false}/>
                    <YAxis hide/>
                    <Tooltip content={<Tip/>}/>
                    <Bar dataKey="value" fill="#5A9BE8" radius={[5,5,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              }
            </div>
          </>}
        </>}

        {/* ── ADD ── */}
        {view==="add" && <>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:22,marginBottom:20}}>New Expense</div>
          <div style={{marginBottom:20}}>
            <div className="lbl">Amount</div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:18,top:"50%",transform:"translateY(-50%)",fontSize:22,color:"#555",fontFamily:"'Syne',sans-serif",fontWeight:700}}>₹</span>
              <input className="amt-inp" type="number" placeholder="0" value={amt} onChange={e=>setAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()} autoFocus/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div className="lbl">Category</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {Object.entries(CATEGORIES).map(([c,info])=>(
                <button key={c} className={`cat-chip ${cat===c?"active":""}`} style={{"--ac":info.color}} onClick={()=>setCat(c)}>
                  <span>{info.icon}</span><span>{c}</span>
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div className="lbl">Subcategory</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {CATEGORIES[cat].subcategories.map(s=>(
                <button key={s} className={`sub-chip ${sub===s?"active":""}`} style={{"--ac":CATEGORIES[cat].color}} onClick={()=>setSub(s)}>{s}</button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
            <div><div className="lbl">Note (optional)</div><input className="txt-inp" placeholder="e.g. Zomato" value={nte} onChange={e=>setNte(e.target.value)}/></div>
            <div><div className="lbl">Date</div><input className="date-inp" type="date" value={dt} onChange={e=>setDt(e.target.value)}/></div>
          </div>
          <button className={`save-btn ${saved?"ok":""}`} onClick={handleSave}>{saved?"✓ Saved!":"Save Expense"}</button>
        </>}

        {/* ── HISTORY ── */}
        {view==="history" && <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:22}}>History</div>
            <button onClick={doLoad} style={{background:"#1E1E28",border:"1.5px solid #2A2A38",borderRadius:10,color:"#aaa",fontSize:12,fontWeight:500,padding:"7px 14px",cursor:"pointer"}}>↻ Refresh</button>
          </div>
          <input className="srch" placeholder="Search note, category, subcategory…" value={search} onChange={e=>setSearch(e.target.value)}/>
          {histList.length===0
            ? <div className="card" style={{textAlign:"center",padding:40,color:"#555"}}><div style={{fontSize:32,marginBottom:8}}>📭</div>No results</div>
            : <div className="card">
                {histList.slice(0,80).map(e=>(
                  <div key={e.id} className="erow" style={{opacity:e.reconciled?0.45:1}}>
                    <div style={{width:34,height:34,borderRadius:10,background:`${CATEGORIES[e.category]?.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{CATEGORIES[e.category]?.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,textDecoration:e.reconciled?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.subcategory}{e.note?` · ${e.note}`:""}</div>
                      <div style={{fontSize:11,color:"#555",marginTop:2}}>{e.category} · {e.date}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:CATEGORIES[e.category]?.color}}>{fmt(e.amount)}</div>
                      <button onClick={()=>deleteExp(e)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:18,lineHeight:1,transition:"color 0.15s"}} onMouseEnter={ev=>ev.target.style.color="#E85A5A"} onMouseLeave={ev=>ev.target.style.color="#333"}>×</button>
                    </div>
                  </div>
                ))}
                {histList.length>80&&<div style={{textAlign:"center",padding:"10px 0",fontSize:12,color:"#555"}}>Showing 80 of {histList.length} — use search to narrow</div>}
              </div>
          }
        </>}

        {/* ── RECONCILE ── */}
        {view==="reconcile" && (()=>{
          const unver = expenses.filter(e=>!e.reconciled);
          const ver   = expenses.filter(e=>e.reconciled);
          return <>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:22,marginBottom:6}}>CC Reconciliation</div>
            <div style={{fontSize:13,color:"#555",marginBottom:18}}>Tap ✓ to mark entries verified against your credit card bill</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              <div className="card" style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#E85A5A",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Unverified</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:18}}>{fmt(unver.reduce((s,e)=>s+e.amount,0))}</div>
                <div style={{fontSize:11,color:"#555",marginTop:3}}>{unver.length} entries</div>
              </div>
              <div className="card" style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#5AE8A0",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Verified</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:18}}>{fmt(ver.reduce((s,e)=>s+e.amount,0))}</div>
                <div style={{fontSize:11,color:"#555",marginTop:3}}>{ver.length} entries</div>
              </div>
            </div>
            <div className="card">
              <div className="lbl" style={{color:"#E85A5A",marginBottom:12}}>Needs Verification</div>
              {unver.length===0 && <div style={{color:"#555",fontSize:13,textAlign:"center",padding:"16px 0"}}>🎉 All entries verified!</div>}
              {unver.slice(0,60).map(e=>(
                <div key={e.id} className="erow">
                  <div style={{width:34,height:34,borderRadius:10,background:`${CATEGORIES[e.category]?.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{CATEGORIES[e.category]?.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.subcategory}{e.note?` · ${e.note}`:""}</div>
                    <div style={{fontSize:11,color:"#555",marginTop:2}}>{e.date}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:CATEGORIES[e.category]?.color}}>{fmt(e.amount)}</div>
                    <button onClick={()=>toggleRecon(e)} style={{background:"#1A1A24",border:"1.5px solid #2A2A38",borderRadius:8,width:30,height:30,color:"#666",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={ev=>{ev.currentTarget.style.background="#1A3A1A";ev.currentTarget.style.borderColor="#5AE8A0";ev.currentTarget.style.color="#5AE8A0"}} onMouseLeave={ev=>{ev.currentTarget.style.background="#1A1A24";ev.currentTarget.style.borderColor="#2A2A38";ev.currentTarget.style.color="#666"}}>✓</button>
                  </div>
                </div>
              ))}
            </div>
          </>;
        })()}
      </div>

      {/* Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0F0F13",borderTop:"1px solid #1A1A22",padding:"6px 0 max(14px, env(safe-area-inset-bottom))"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-around",alignItems:"center"}}>
          <button className={`nav-btn ${view==="dashboard"?"active":""}`} onClick={()=>setView("dashboard")}><span className="ic">◎</span>Dash</button>
          <button className={`nav-btn ${view==="history"?"active":""}`}   onClick={()=>setView("history")}><span className="ic">≡</span>History</button>
          <button onClick={()=>setView("add")} style={{background:"#E8845A",border:"none",borderRadius:"50%",width:52,height:52,fontSize:28,color:"#0F0F13",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-12,boxShadow:"0 4px 20px rgba(232,132,90,0.4)",transition:"transform 0.15s",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>+</button>
          <button className={`nav-btn ${view==="reconcile"?"active":""}`} onClick={()=>setView("reconcile")}><span className="ic">◈</span>Verify</button>
          <button className="nav-btn" style={{opacity:0,pointerEvents:"none"}}><span className="ic">·</span></button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
