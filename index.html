// Expenses: Date|Category|Subcategory|Amount|Note|Reconciled|Payment|CC Amount
const r2e = (row,i) => ({
  id:i+2, date:row[0]||"", category:row[1]||"Other",
  subcategory:row[2]||"Miscellaneous", amount:parseFloat(row[3])||0,
  note:row[4]||"", reconciled:row[5]==="TRUE",
  payment:row[6]||"CC", ccAmount:parseFloat(row[7])||parseFloat(row[3])||0
});
const e2r = e => [e.date,e.category,e.subcategory,e.amount,e.note,
                  e.reconciled?"TRUE":"FALSE",e.payment||"CC",e.ccAmount||e.amount];

// Income: Date|Type|Amount|Note
const r2i = (row,i) => ({
  id:"i"+(i+2), date:row[0]||"",
  type:row[1]||"Monthly Salary",
  amount:parseFloat(row[2])||0, note:row[3]||""
});
const i2r = i => [i.date, i.type, i.amount, i.note];

  "Transport": {icon:"🚗",color:"#5A9BE8",sub:["Uber/Cab","Train/Metro","Flights","Petrol","Parking"]},

  "Financial": {icon:"💰",color:"#5AE8A0",sub:["Insurance","EMI","Investments","Tax"]},
  "Home":      {icon:"🏠",color:"#E8C45A",sub:["Rent","Maintenance","Electricity","Internet","Groceries (Home)","Repairs"]},
  "Loans":     {icon:"🏦",color:"#E85A9B",sub:["Personal Loan","Education Loan","Lent Money","Credit Card Payment"]},
  "One Time":  {icon:"🛒",color:"#5AE8D4",sub:["Electronics","Furniture","Clothing","Other Purchase","Medical"]},
  "Other":     {icon:"📦",color:"#E8D45A",sub:["Miscellaneous","Donation","Refund"]}

// Merge saved custom subcategories from localStorage-like storage
let CATEGORIES = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));

const SCHED_SHEET    = "Scheduled";

const SCHEDULED_DEFAULTS = [
  {id:1, name:"House Rent",        category:"Home",      subcategory:"Rent",           amount:40000, payment:"Cash"},
  {id:2, name:"Bachraj Maintenance",category:"Home",      subcategory:"Maintenance",    amount:2952,  payment:"Cash"},
  {id:3, name:"Maid",              category:"Home",      subcategory:"Maintenance",    amount:800,   payment:"Cash"},
  {id:4, name:"Netflix",           category:"Lifestyle", subcategory:"Subscriptions",  amount:649,   payment:"CC"},
  {id:5, name:"Spotify/YT Premium",category:"Lifestyle", subcategory:"Subscriptions",  amount:299,   payment:"CC"},
  {id:6, name:"Google One",        category:"Lifestyle", subcategory:"Subscriptions",  amount:650,   payment:"CC"},
  {id:7, name:"PPF",               category:"Financial", subcategory:"Investments",    amount:12500, payment:"Cash"},
  {id:8, name:"SIP Motilal",       category:"Financial", subcategory:"Investments",    amount:10000, payment:"Cash"},
  {id:9, name:"SIP Parag Parikh",  category:"Financial", subcategory:"Investments",    amount:10000, payment:"Cash"},
  {id:10,name:"Tanishq Gold",      category:"Financial", subcategory:"Investments",    amount:5000,  payment:"CC"},
  {id:11,name:"Education Loan EMI",category:"Loans",     subcategory:"Education Loan", amount:50000, payment:"Cash"},
];

const fmt    = n => "₹"+Number(n).toLocaleString("en-IN",{maximumFractionDigits:0});
const getNow = () => new Date().toISOString().split("T")[0];
const MN     = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function monthRange() {
  const n=new Date();
  return {
    start:new Date(n.getFullYear(),n.getMonth(),1).toISOString().split("T")[0],
    end:  new Date(n.getFullYear(),n.getMonth()+1,0).toISOString().split("T")[0]
  };
}

const CSS=`

function App() {
  const [cats,    setCats]    = useState(CATEGORIES);
  const [auth,    setAuth]    = useState("loading");
  const [authErr, setAuthErr] = useState("");
  const [gapiOk,  setGapiOk] = useState(false);
  const [gisOk,   setGisOk]  = useState(false);
  const tokenRef              = useRef(null);
  const initDone              = useRef(false);

  const [expenses,   setExpenses]   = useState([]);
  const [incomes,    setIncomes]    = useState([]);
  const [syncing,    setSyncing]    = useState(false);
  const [syncMsg,    setSyncMsg]    = useState("");
  const [dataLoaded, setDataLoaded] = useState(false);

  const [view,       setView]       = useState("dashboard");
  const [scheduled,  setScheduled]  = useState(SCHEDULED_DEFAULTS);
  const [showModal,  setShowModal]  = useState(false);
  const [modalItems, setModalItems] = useState([]);
  const [confirmedM, setConfirmedM] = useState(new Set());
  // Settings state
  const [newSubCat,  setNewSubCat]  = useState("");
  const [newSubFor,  setNewSubFor]  = useState("Transport");
  // New scheduled payment form
  const [showAddSched, setShowAddSched] = useState(false);
  const [schedName,    setSchedName]    = useState("");
  const [schedCat,     setSchedCat]     = useState("Food");
  const [schedSub,     setSchedSub]     = useState("Groceries");
  const [schedAmt,     setSchedAmt]     = useState("");
  const [schedPay,     setSchedPay]     = useState("CC");
  const [addMode, setAddMode] = useState("expense"); // "expense" | "income"
  const [range,   setRange]   = useState("month");
  const [tab,     setTab]     = useState("overview");
  const [srch,      setSrch]      = useState("");
  const [anlCat,    setAnlCat]    = useState(null); // selected category for drill-down
  const [anlView,   setAnlView]   = useState("trends"); // "trends"|"drilldown"|"savings" 

  // Expense form
  const [cat,     setCat]     = useState("Food");
  const [sub,     setSub]     = useState("Groceries");
  const [amt,     setAmt]     = useState("");
  const [nte,     setNte]     = useState("");
  const [dt,      setDt]      = useState(getNow());
  const [saved,   setSaved]   = useState(false);
  const [payment, setPayment] = useState("CC");
  const [isSplit,   setIsSplit]   = useState(false);
  const [splitN,    setSplitN]    = useState(2);
  const [isRefund,   setIsRefund]   = useState(false);
  const [editingExp, setEditingExp] = useState(null); // expense being edited

  // Income form
  const [incType, setIncType] = useState("Monthly Salary");
  const [incAmt,  setIncAmt]  = useState("");
  const [incNote, setIncNote] = useState("");
  const [incDt,   setIncDt]   = useState(getNow());
  const [incSaved,setIncSaved]= useState(false);

  useEffect(()=>{ setSub(CATEGORIES[cat].sub[0]); },[cat]);

  const fullAmt  = parseFloat(amt)||0;
  const myAmt    = isRefund
    ? -(isSplit&&splitN>1 ? Math.round(fullAmt/splitN*100)/100 : fullAmt)
    :  (isSplit&&splitN>1 ? Math.round(fullAmt/splitN*100)/100 : fullAmt);
  const ccAmt    = payment==="CC" ? (isRefund ? -fullAmt : fullAmt) : 0;

  // ── Load scripts ──────────────────────────────────────────────────────────
  useEffect(()=>{
    function loadGapi() {
      if(window.gapi){
        window.gapi.load("client",async()=>{
          try{ await window.gapi.client.init({discoveryDocs:[DISCOVERY]}); setGapiOk(true); }
          catch(e){ setAuth("error"); setAuthErr("Google API init failed: "+e.message); }
        });
      } else {
        const s=document.createElement("script"); s.src="https://apis.google.com/js/api.js";
        s.onload=loadGapi; s.onerror=()=>{ setAuth("error"); setAuthErr("Failed to load Google API."); };
        document.head.appendChild(s);
      }
    }
    function loadGis() {
      if(window.google?.accounts?.oauth2){
        tokenRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:CLIENT_ID, scope:SCOPES,
          callback:async resp=>{
            if(resp.error){ setAuthErr(resp.error); setAuth("error"); return; }
            setAuth("ready"); await doLoad();
          }
        });
        setGisOk(true);
      } else {
        const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client";
        s.onload=loadGis; s.onerror=()=>{ setAuth("error"); setAuthErr("Failed to load Google Sign-In."); };
        document.head.appendChild(s);
      }
    }
    loadGapi(); loadGis();
  },[]);

  useEffect(()=>{
    if(gapiOk&&gisOk&&!initDone.current){
      initDone.current=true;
      try{ tokenRef.current.requestAccessToken({prompt:""}); }
      catch(e){ setAuth("error"); setAuthErr(String(e)); }
    }
  },[gapiOk,gisOk]);

  const flash = msg=>{ setSyncMsg(msg); setTimeout(()=>setSyncMsg(""),3500); };

  const ensureSheets = async () => {
    // Expenses header
    const r1=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SHEET_ID,range:`${EXP_SHEET}!A1:H1`});
    if(!r1.result.values||r1.result.values[0]?.[0]!=="Date"){
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:SHEET_ID,range:`${EXP_SHEET}!A1:H1`,valueInputOption:"RAW",
        resource:{values:[["Date","Category","Subcategory","Amount","Note","Reconciled","Payment","CC Amount"]]}
      });
    }
    // Income sheet — create if missing
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:SHEET_ID});
    const exists=meta.result.sheets.some(s=>s.properties.title===INC_SHEET);
    if(!exists){
      await gapi.client.sheets.spreadsheets.batchUpdate({
        spreadsheetId:SHEET_ID,
        resource:{requests:[{addSheet:{properties:{title:INC_SHEET}}}]}
      });
    }
    const r2=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SHEET_ID,range:`${INC_SHEET}!A1:D1`});
    if(!r2.result.values||r2.result.values[0]?.[0]!=="Date"){
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:SHEET_ID,range:`${INC_SHEET}!A1:D1`,valueInputOption:"RAW",
        resource:{values:[["Date","Type","Amount","Note"]]}
      });
    }
  };

  const doLoad = useCallback(async()=>{
    setSyncing(true);
    try{
      await ensureSheets();
      const [re,ri] = await Promise.all([
        gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SHEET_ID,range:`${EXP_SHEET}!A2:H`}),
        gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SHEET_ID,range:`${INC_SHEET}!A2:D`})
      ]);
      setExpenses((re.result.values||[]).map(r2e).filter(e=>e.amount>0).sort((a,b)=>b.date.localeCompare(a.date)));
      setIncomes((ri.result.values||[]).map(r2i).filter(i=>i.amount>0).sort((a,b)=>b.date.localeCompare(a.date)));
      setDataLoaded(true); flash("✓ Synced");
      // Check if monthly confirmation needed
      const now = new Date();
      const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
      // Load custom subcategories
      try {
        const stored = await window.storage.get("custom_cats");
        if (stored?.value) {
          const custom = JSON.parse(stored.value);
          const merged = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
          for (const [cat, subs] of Object.entries(custom)) {
            if (merged[cat]) {
              subs.forEach(s => { if (!merged[cat].sub.includes(s)) merged[cat].sub.push(s); });
            }
          }
          setCats(merged);
          CATEGORIES = merged;
        }
      } catch {}
      // Load scheduled payments
      try {
        const stored = await window.storage.get("scheduled_payments");
        if (stored?.value) setScheduled(JSON.parse(stored.value));
      } catch {}
      // Load confirmed/skipped months
      let confirmedSet = new Set();
      try {
        const stored = await window.storage.get("confirmed_months");
        if (stored?.value) confirmedSet = new Set(JSON.parse(stored.value));
      } catch {}
      setConfirmedM(confirmedSet);
      // Show modal only if this month is neither confirmed nor skipped
      // Support both old key format (2026-06) and new format (confirmed:2026-06)
      const isConfirmed = confirmedSet.has(`confirmed:${monthKey}`) || confirmedSet.has(monthKey);
      const isSkipped   = confirmedSet.has(`skipped:${monthKey}`);

      if (!isConfirmed && !isSkipped) {
        let sched = SCHEDULED_DEFAULTS;
        try {
          const stored = await window.storage.get("scheduled_payments");
          if (stored?.value) sched = JSON.parse(stored.value);
        } catch {}

        // Auto-confirm if all scheduled payments already exist in this month's expenses
        // (handles case where user added them manually or already confirmed in a prior session)
        const thisMonthExp = (re.result.values||[])
          .map(r2e)
          .filter(e => e.amount > 0 && e.date.startsWith(monthKey));

        const alreadyAdded = sched.every(s =>
          thisMonthExp.some(e =>
            e.note === s.name &&
            e.category === s.category &&
            Math.abs(e.amount - s.amount) / Math.max(s.amount, 1) < 0.5
          )
        );

        if (alreadyAdded) {
          // All payments found — silently mark confirmed, skip modal
          const nc = new Set([...confirmedSet, `confirmed:${monthKey}`]);
          setConfirmedM(nc);
          await window.storage.set("confirmed_months", JSON.stringify([...nc])).catch(()=>{});
        } else {
          setModalItems(sched.map(s => ({...s, confirm:true, editAmt:s.amount})));
          setTimeout(()=>setShowModal(true), 900);
        }
      }
    } catch(e){ flash("⚠ "+(e.result?.error?.message||e.message||"Load error")); }
    finally{ setSyncing(false); }
  },[]);

  const signIn=()=>{ setAuth("loading"); try{ tokenRef.current.requestAccessToken({prompt:"consent"}); } catch(e){ setAuth("error"); setAuthErr(String(e)); } };

  // ── Save expense ──────────────────────────────────────────────────────────
  const confirmMonth = async () => {
    const now = new Date();
    const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
    const toAdd = modalItems.filter(i=>i.confirm && i.editAmt>0).map(i=>({
      id: Date.now()+Math.random(),
      date, category:i.category, subcategory:i.subcategory,
      amount:Number(i.editAmt), note:i.name,
      reconciled:false, payment:i.payment, ccAmount:i.payment==="CC"?Number(i.editAmt):0
    }));
    setExpenses(p=>[...toAdd,...p].sort((a,b)=>b.date.localeCompare(a.date)));
    try {
      if (toAdd.length>0) {
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:SHEET_ID, range:`${EXP_SHEET}!A:H`,
          valueInputOption:"RAW", insertDataOption:"INSERT_ROWS",
          resource:{values:toAdd.map(e2r)}
        });
      }
      // Mark as confirmed for this month
      const newConfirmed = new Set([...confirmedM, `confirmed:${monthKey}`]);
      setConfirmedM(newConfirmed);
      await window.storage.set("confirmed_months", JSON.stringify([...newConfirmed]));
      flash(`✓ ${toAdd.length} scheduled payments added`);
    } catch { flash("⚠ Could not save to sheet"); }
    setShowModal(false);
  };

  const saveScheduled = async (list) => {
    setScheduled(list);
    await window.storage.set("scheduled_payments", JSON.stringify(list)).catch(()=>{});
  };

  const addSubcategory = async (catName, subName) => {
    if (!subName.trim() || !catName) return;
    const updated = JSON.parse(JSON.stringify(cats));
    if (!updated[catName].sub.includes(subName.trim())) {
      updated[catName].sub.push(subName.trim());
      setCats(updated);
      CATEGORIES = updated;
      // Persist custom subs
      const custom = {};
      for (const [c, info] of Object.entries(updated)) {
        const defaults = DEFAULT_CATEGORIES[c]?.sub || [];
        const extras = info.sub.filter(s=>!defaults.includes(s));
        if (extras.length) custom[c] = extras;
      }
      await window.storage.set("custom_cats", JSON.stringify(custom)).catch(()=>{});
    }
  };

  // Start editing an expense — pre-fill Add form
  const startEdit = (e) => {
    setEditingExp(e);
    setAmt(String(Math.abs(e.amount)));
    setNte(e.note);
    setDt(e.date);
    setPayment(e.payment||"CC");
    setCat(e.category);
    setSub(e.subcategory);
    setIsRefund(e.amount < 0);
    if (e.ccAmount && e.ccAmount !== Math.abs(e.amount) && e.ccAmount > 0) {
      setIsSplit(true);
      // Reverse-engineer split count (closest integer)
      const n = Math.round(e.ccAmount / Math.abs(e.amount));
      setSplitN(n > 1 ? n : 2);
    } else {
      setIsSplit(false); setSplitN(2);
    }
    setAddMode("expense");
    setView("add");
    window.scrollTo(0,0);
  };

  const handleSaveExpense = async()=>{
    if(!amt||isNaN(amt)||fullAmt<=0) return;
    const isEdit = !!editingExp;
    const entry = {
      id: isEdit ? editingExp.id : Date.now(),
      date:dt, category:cat, subcategory:sub, amount:myAmt,
      note:nte.trim(), reconciled: isEdit ? editingExp.reconciled : false,
      payment, ccAmount:ccAmt
    };
    if (isEdit) {
      setExpenses(p=>p.map(x=>x.id===editingExp.id?entry:x).sort((a,b)=>b.date.localeCompare(a.date)));
    } else {
      setExpenses(p=>[entry,...p].sort((a,b)=>b.date.localeCompare(a.date)));
    }
    setAmt(""); setNte(""); setDt(getNow()); setIsSplit(false); setSplitN(2);
    setIsRefund(false); setEditingExp(null);
    setSaved(true); setTimeout(()=>setSaved(false),1200);
    try{
      if (isEdit) {
        // Delete old row then append updated row
        const ri = await findExpRow(editingExp);
        if (ri > 0) {
          const m = await gapi.client.sheets.spreadsheets.get({spreadsheetId:SHEET_ID});
          const sid = m.result.sheets.find(s=>s.properties.title===EXP_SHEET)?.properties.sheetId;
          await gapi.client.sheets.spreadsheets.batchUpdate({
            spreadsheetId:SHEET_ID,
            resource:{requests:[{deleteDimension:{range:{sheetId:sid,dimension:"ROWS",startIndex:ri,endIndex:ri+1}}}]}
          });
        }
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:SHEET_ID, range:`${EXP_SHEET}!A:H`,
          valueInputOption:"RAW", insertDataOption:"INSERT_ROWS",
          resource:{values:[e2r(entry)]}
        });
        flash("✓ Expense updated");
      } else {
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:SHEET_ID, range:`${EXP_SHEET}!A:H`,
          valueInputOption:"RAW", insertDataOption:"INSERT_ROWS",
          resource:{values:[e2r(entry)]}
        });
        flash("✓ Saved to Sheet");
      }
    } catch(err){ flash("⚠ Save failed: "+err.message); }
  };

  // ── Save income ───────────────────────────────────────────────────────────
  const handleSaveIncome = async()=>{
    const a=parseFloat(incAmt);
    if(!a||a<=0) return;
    const entry={id:"i"+Date.now(),date:incDt,type:incType,amount:a,note:incNote.trim()};
    setIncomes(p=>[entry,...p].sort((a,b)=>b.date.localeCompare(a.date)));
    setIncAmt(""); setIncNote(""); setIncDt(getNow());
    setIncSaved(true); setTimeout(()=>setIncSaved(false),1200);
    try{
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId:SHEET_ID,range:`${INC_SHEET}!A:D`,
        valueInputOption:"RAW",insertDataOption:"INSERT_ROWS",
        resource:{values:[i2r(entry)]}
      });
      flash("✓ Income saved");
    } catch{ flash("⚠ Save failed"); }
  };

  const findExpRow = async e=>{
    const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SHEET_ID,range:`${EXP_SHEET}!A:H`});
    return (r.result.values||[]).findIndex(row=>row[0]===e.date&&row[1]===e.category&&row[2]===e.subcategory&&parseFloat(row[3])===e.amount&&row[4]===e.note);
  };
  const toggleRecon=async e=>{
    const u={...e,reconciled:!e.reconciled};
    setExpenses(p=>p.map(x=>x.id===e.id?u:x));
    try{
      const ri=await findExpRow(e);
      if(ri>0) await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId:SHEET_ID,range:`${EXP_SHEET}!F${ri+1}`,
        valueInputOption:"RAW",resource:{values:[[u.reconciled?"TRUE":"FALSE"]]}
      });
      flash("✓ Updated");
    } catch{ flash("⚠ Sync failed"); }
  };
  const deleteExp=async e=>{
    setExpenses(p=>p.filter(x=>x.id!==e.id));
    try{
      const ri=await findExpRow(e);
      if(ri>0){
        const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:SHEET_ID});
        const sid=m.result.sheets.find(s=>s.properties.title===EXP_SHEET)?.properties.sheetId;
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:SHEET_ID,
          resource:{requests:[{deleteDimension:{range:{sheetId:sid,dimension:"ROWS",startIndex:ri,endIndex:ri+1}}}]}
        });
      }
      flash("✓ Deleted");
    } catch{ flash("⚠ Delete failed"); }
  };

  // ── Derived data ──────────────────────────────────────────────────────────
  const filtered=useMemo(()=>{
    if(range==="month"){const{start,end}=monthRange();return expenses.filter(e=>e.date>=start&&e.date<=end);}
    if(range==="week"){const d=new Date();d.setDate(d.getDate()-6);return expenses.filter(e=>e.date>=d.toISOString().split("T")[0]);}
    return expenses;
  },[expenses,range]);

  const filteredInc=useMemo(()=>{
    if(range==="month"){const{start,end}=monthRange();return incomes.filter(i=>i.date>=start&&i.date<=end);}
    if(range==="week"){const d=new Date();d.setDate(d.getDate()-6);return incomes.filter(i=>i.date>=d.toISOString().split("T")[0]);}
    return incomes;
  },[incomes,range]);

  const totalExp = useMemo(()=>filtered.reduce((s,e)=>s+e.amount,0),[filtered]);
  const totalInc = useMemo(()=>filteredInc.reduce((s,i)=>s+i.amount,0),[filteredInc]);
  const savings  = totalInc - totalExp;

  const byCat=useMemo(()=>{
    const m={};
    for(const e of filtered) m[e.category]=(m[e.category]||0)+e.amount;
    return Object.entries(m).map(([n,v])=>({name:n,value:v,color:CATEGORIES[n]?.color||"#888"})).sort((a,b)=>b.value-a.value);
  },[filtered]);
  const bySub=useMemo(()=>{
    const m={};
    for(const e of filtered){const k=`${e.category}|${e.subcategory}`;if(!m[k])m[k]={name:e.subcategory,category:e.category,value:0,color:CATEGORIES[e.category]?.color||"#888"};m[k].value+=e.amount;}
    return Object.values(m).sort((a,b)=>b.value-a.value).slice(0,10);
  },[filtered]);

  // Monthly savings trend (income - expenses per month, last 12 months)
  const savingsTrend=useMemo(()=>{
    const months={};
    for(const e of expenses){
      const d=new Date(e.date);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!months[k]) months[k]={label:`${MN[d.getMonth()]} ${d.getFullYear()}`,exp:0,inc:0};
      months[k].exp+=e.amount;
    }
    for(const i of incomes){
      const d=new Date(i.date);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!months[k]) months[k]={label:`${MN[d.getMonth()]} ${d.getFullYear()}`,exp:0,inc:0};
      months[k].inc+=i.amount;
    }
    return Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12)
      .map(([,v])=>({...v,savings:v.inc-v.exp}));
  },[expenses,incomes]);

  // Cumulative savings over all time
  const cumulativeSavings=useMemo(()=>{
    let running=0;
    return savingsTrend.map(m=>{ running+=m.savings; return {...m,cumulative:running}; });
  },[savingsTrend]);

  const daily=useMemo(()=>{
    const days=[];const now=new Date();
    for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];days.push({label:`${d.getDate()} ${MN[d.getMonth()]}`,date:k,value:0});}
    for(const e of expenses){const f=days.find(d=>d.date===e.date);if(f)f.value+=e.amount;}
    return days;
  },[expenses]);


  // ── Analytics computations ─────────────────────────────────────
  const catAnalytics = useMemo(()=>{
    const now = new Date();
    const mk = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const buckets = {};
    for (let i=0;i<13;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);buckets[mk(d)]={};}
    for (const e of expenses){
      const k=e.date.slice(0,7);
      if(!buckets[k]||e.amount<=0) continue;
      buckets[k][e.category]=(buckets[k][e.category]||0)+e.amount;
    }
    const sorted=Object.keys(buckets).sort();
    const curMk=mk(now);
    const cur=buckets[curMk]||{};
    const complete=sorted.filter(m=>m<curMk);
    const l3=complete.slice(-3); const l6=complete.slice(-6);
    const avg=(months,cat)=>months.length?months.reduce((s,m)=>s+(buckets[m]?.[cat]||0),0)/months.length:0;
    const avgInc=incomes.length>0?incomes.reduce((s,i)=>s+i.amount,0)/Math.max(1,new Set(incomes.map(i=>i.date.slice(0,7))).size):0;
    return Object.keys(cats).map(cat=>{
      const m1=cur[cat]||0, a3=avg(l3,cat), a6=avg(l6,cat);
      const pct=a3>0?Math.round((m1-a3)/a3*100):0;
      let trend="stable",tColor="#888";
      if(pct>10){trend="up";tColor="#E85A5A";}
      else if(pct<-10){trend="down";tColor="#5AE8A0";}
      const history=sorted.map(mk2=>({label:`${MN[parseInt(mk2.split("-")[1])-1]} '${mk2.slice(2,4)}`,value:buckets[mk2]?.[cat]||0}));
      const subMap={};
      for(const e of expenses){if(e.category!==cat||e.date.slice(0,7)!==curMk||e.amount<=0)continue;subMap[e.subcategory]=(subMap[e.subcategory]||0)+e.amount;}
      const subBreakdown=Object.entries(subMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
      const nonZero=sorted.filter(m=>(buckets[m]?.[cat]||0)>0);
      const bestMk=nonZero.length?nonZero.reduce((a,b)=>(buckets[a]?.[cat]||0)<(buckets[b]?.[cat]||0)?a:b):null;
      const worstMk=nonZero.length?nonZero.reduce((a,b)=>(buckets[a]?.[cat]||0)>(buckets[b]?.[cat]||0)?a:b):null;
      const bestVal=bestMk?buckets[bestMk]?.[cat]||0:0;
      const worstVal=worstMk?buckets[worstMk]?.[cat]||0:0;
      const bestLbl=bestMk?`${MN[parseInt(bestMk.split("-")[1])-1]} '${bestMk.slice(2,4)}`:"—";
      const worstLbl=worstMk?`${MN[parseInt(worstMk.split("-")[1])-1]} '${worstMk.slice(2,4)}`:"—";
      const pctOfInc=avgInc>0?Math.round(a6/avgInc*100):0;
      let insight=null;
      if(trend==="up"&&a6>0&&m1>a6){const sav=Math.round(m1-a6);if(sav>500)insight=`↑ ${pct}% above 6M avg · reducing to avg saves ${fmt(sav)}/mo`;}
      else if(trend==="down"&&a3>0){insight=`↓ ${Math.abs(pct)}% below 3M avg · good control`;}
      return {cat,m1,a3,a6,pct,trend,tColor,history,subBreakdown,bestLbl,bestVal,worstLbl,worstVal,pctOfInc,insight};
    });
  },[expenses,incomes,cats]);

  const savingsRate = useMemo(()=>{
    const now=new Date();
    const map={};
    for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;map[k]={label:`${MN[d.getMonth()]} '${d.getFullYear().toString().slice(2)}`,inc:0,exp:0};}
    for(const i of incomes){const k=i.date.slice(0,7);if(map[k])map[k].inc+=i.amount;}
    for(const e of expenses){const k=e.date.slice(0,7);if(map[k]&&e.amount>0)map[k].exp+=e.amount;}
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([,v])=>({...v,rate:v.inc>0?Math.round((v.inc-v.exp)/v.inc*100):0,savings:v.inc-v.exp}));
  },[expenses,incomes]);

  const hist=useMemo(()=>{
    if(!srch) return expenses;
    const q=srch.toLowerCase();
    return expenses.filter(e=>e.note.toLowerCase().includes(q)||e.subcategory.toLowerCase().includes(q)||e.category.toLowerCase().includes(q));
  },[expenses,srch]);

  const rl=range==="month"?(()=>{const n=new Date();return `${MN[n.getMonth()]} ${n.getFullYear()}`;})():range==="week"?"Last 7 days":"All time";
  const Tip=({active,payload,label})=>active&&payload?.length?<div className="tt">{label&&<div style={{color:"#888",marginBottom:2}}>{label}</div>}{fmt(payload[0].value)}</div>:null;
  const MultiTip=({active,payload,label})=>active&&payload?.length?<div className="tt">
    <div style={{color:"#888",marginBottom:4}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{color:p.color,marginBottom:2}}>{p.name}: {fmt(p.value)}</div>)}
  </div>:null;

  // ── Loading / Auth screens ─────────────────────────────────────────────────
  if(auth==="loading") return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <style>{CSS}</style>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,letterSpacing:"-0.5px"}}>Kaha gaya mera Paisa<span style={{color:"#E8845A"}}>!!</span></div><div style={{fontSize:11,color:"#555",letterSpacing:"1px",marginTop:4}}>by Hardik Mall</div>
      <div className="sp"/>
      <div style={{fontSize:13,color:"#555"}}>Connecting to Google…</div>
      <button onClick={()=>setAuth("error")} style={{marginTop:24,background:"none",border:"1px solid #333",borderRadius:10,color:"#555",fontSize:12,padding:"8px 16px",cursor:"pointer"}}>Sign in manually instead</button>
    </div>
  );
  if(auth==="error"||auth==="need-login") return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center",gap:12}}>
      <style>{CSS}</style>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,letterSpacing:"-0.5px"}}>Kaha gaya mera Paisa<span style={{color:"#E8845A"}}>!!</span></div><div style={{fontSize:11,color:"#555",letterSpacing:"1px",marginTop:4}}>by Hardik Mall</div>
      <div style={{fontSize:14,color:"#aaa",marginTop:16}}>Sign in with Google to access your finance data</div>
      {authErr&&<div style={{fontSize:11,color:"#E85A5A",maxWidth:320,marginTop:4}}>{authErr}</div>}
      <button onClick={signIn} style={{marginTop:20,background:"#E8845A",color:"#0F0F13",border:"none",borderRadius:14,fontSize:15,fontWeight:700,fontFamily:"'Syne',sans-serif",padding:"14px 40px",cursor:"pointer"}}>🔐 Sign in with Google</button>
    </div>
  );

  // ── Main App ──────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#0F0F13",color:"#F0EDE6",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{CSS}</style>
      <div style={{padding:"20px 20px 0",maxWidth:520,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,letterSpacing:"-0.3px",lineHeight:1.1}}>Kaha gaya mera Paisa<span style={{color:"#E8845A"}}>!!</span></div>
            <div style={{fontSize:10,color:"#555",letterSpacing:"1px",marginTop:2}}>by Hardik Mall</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {syncing&&<span className="sp"/>}
            {syncMsg&&<span style={{fontSize:11,color:syncMsg.startsWith("✓")?"#5AE8A0":"#E8C45A"}}>{syncMsg}</span>}
            {view==="dashboard"&&["month","week","all"].map(r=>(
              <button key={r} className={`rb ${range===r?"on":""}`} onClick={()=>setRange(r)}>
                {r==="month"?"Month":r==="week"?"Week":"All"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:"16px 20px 110px"}}>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&<>
          {/* Hero strip — Income / Expenses / Savings */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
            <div className="card" style={{padding:"14px 12px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#5AE8A0",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Income</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"#5AE8A0"}}>{fmt(totalInc)}</div>
            </div>
            <div className="card" style={{padding:"14px 12px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#E8845A",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Spent</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"#E8845A"}}>{fmt(totalExp)}</div>
            </div>
            <div className="card" style={{padding:"14px 12px",textAlign:"center",background:savings>=0?"color-mix(in srgb,#5AE8A0 8%,#16161E)":"color-mix(in srgb,#E85A5A 8%,#16161E)"}}>
              <div style={{fontSize:10,color:savings>=0?"#5AE8A0":"#E85A5A",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Saved</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:savings>=0?"#5AE8A0":"#E85A5A"}}>{fmt(Math.abs(savings))}</div>
            </div>
          </div>

          <div style={{marginBottom:4}}>
            <div className="lbl">{rl} · Total Spent</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:38,letterSpacing:"-1px",lineHeight:1}}>{fmt(totalExp)}</div>
            <div style={{fontSize:13,color:"#555",marginTop:6}}>{filtered.length} transactions</div>
          </div>

          <div style={{display:"flex",gap:4,margin:"18px 0",background:"#13131A",borderRadius:24,padding:4}}>
            {["overview","breakdown","trends","savings"].map(t=>(
              <button key={t} className={`tab ${tab===t?"on":""}`} style={{flex:1,textAlign:"center",fontSize:11}} onClick={()=>setTab(t)}>
                {t[0].toUpperCase()+t.slice(1)}
              </button>
            ))}
          </div>

          {!dataLoaded&&<div className="card" style={{textAlign:"center",padding:40,color:"#555"}}><span className="sp"/><div style={{marginTop:12,fontSize:13}}>Loading from Google Sheets…</div></div>}

          {dataLoaded&&tab==="overview"&&(filtered.length===0
            ?<div className="card" style={{textAlign:"center",padding:40,color:"#555"}}><div style={{fontSize:32,marginBottom:8}}>🌱</div>No expenses this period</div>
            :<>
              {/* Category trend cards */}
              <div style={{marginBottom:16}}>
                <div className="lbl">Category Trends · This Month</div>
                {catAnalytics.filter(a=>a.m1>0||a.a3>0).map((a,i)=>(
                  <div key={i} onClick={()=>{setAnlCat(a.cat);setAnlView("drilldown");setView("analytics");}}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:"1px solid #1A1A24",cursor:"pointer"}}>
                    <div style={{width:34,height:34,borderRadius:10,background:`${cats[a.cat]?.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{cats[a.cat]?.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{fontSize:13,fontWeight:600}}>{a.cat}</span>
                        <span style={{fontSize:11,fontWeight:700,color:a.tColor}}>
                          {a.trend==="up"?"↑":a.trend==="down"?"↓":"→"} {a.pct!==0?`${Math.abs(a.pct)}%`:""}
                        </span>
                      </div>
                      <div style={{display:"flex",gap:10}}>
                        <span style={{fontSize:10,color:"#555"}}>3M avg: <span style={{color:"#888"}}>{fmt(a.a3)}</span></span>
                        <span style={{fontSize:10,color:"#555"}}>6M avg: <span style={{color:"#888"}}>{fmt(a.a6)}</span></span>
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:a.tColor}}>{fmt(a.m1)}</div>
                      <div style={{fontSize:10,color:"#444",marginTop:2}}>this month</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="card">
                <div className="lbl">Recent</div>
                {filtered.slice(0,6).map(e=>(
                  <div key={e.id} className="er">
                    <div style={{width:34,height:34,borderRadius:10,background:`${CATEGORIES[e.category]?.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{CATEGORIES[e.category]?.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {e.subcategory}{e.note?` · ${e.note}`:""}
                        {e.ccAmount>e.amount&&<span style={{marginLeft:6,fontSize:10,color:"#9B5AE8",background:"rgba(155,90,232,.12)",padding:"1px 6px",borderRadius:8}}>split</span>}
                      </div>
                      <div style={{fontSize:11,color:"#555",marginTop:2,display:"flex",gap:8}}>
                        <span>{e.date}</span>

                    <div style={{fontSize:11,color:"#555",marginTop:2}}>{e.date}</div>
                  </div>

                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13,fontWeight:600,color:CATEGORIES[e.category]?.color}}>{fmt(e.ccAmount||e.amount)}</div>

            <div style={{fontSize:12,color:"#555",marginBottom:12}}>Already confirmed this month but need to re-run?</div>
            <button onClick={async()=>{
              const now=new Date();
              const mk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
              const nc=new Set([...confirmedM]);
              nc.delete(`confirmed:${mk}`); nc.delete(`skipped:${mk}`);
              setConfirmedM(nc);
              await window.storage.set("confirmed_months",JSON.stringify([...nc])).catch(()=>{});
              setModalItems(scheduled.map(s=>({...s,confirm:true,editAmt:s.amount})));
              setShowModal(true);
              flash("Monthly payments reset — showing confirmation");
            }} style={{width:"100%",background:"#1A1A24",border:"1.5px solid #2A2A38",borderRadius:10,color:"#aaa",fontSize:13,fontWeight:500,padding:10,cursor:"pointer"}}>
              ↩ Re-confirm this month's payments
            </button>
          </div>
        </>}
      </div>

      {/* ── MONTHLY CONFIRMATION MODAL ── */}
      {showModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowModal(false)}}>
          <div style={{background:"#16161E",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"85vh",overflow:"auto",padding:"24px 20px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20}}>Monthly Payments 📅</div>
              <button onClick={()=>setShowModal(false)} style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer"}}>×</button>
            </div>
            <div style={{fontSize:12,color:"#555",marginBottom:20}}>
              {(()=>{const n=new Date();return `${MN[n.getMonth()]} ${n.getFullYear()}`;})()}  · Confirm and edit amounts before adding
            </div>
            {modalItems.map((item,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #1A1A24"}}>
                <button onClick={()=>setModalItems(p=>p.map((x,j)=>j===i?{...x,confirm:!x.confirm}:x))}
                  style={{width:24,height:24,borderRadius:6,border:"1.5px solid",
                    borderColor:item.confirm?"#5AE8A0":"#333",
                    background:item.confirm?"rgba(90,232,160,.15)":"none",
                    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                    color:"#5AE8A0",fontSize:14,flexShrink:0}}>
                  {item.confirm?"✓":""}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,opacity:item.confirm?1:.4}}>{item.name}</div>
                  <div style={{fontSize:11,color:"#555",marginTop:1}}>{item.category} · <span style={{color:item.payment==="CC"?"#5A9BE8":"#5AE8A0"}}>{item.payment==="CC"?"💳 CC":"💵 Cash"}</span></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                  <span style={{fontSize:13,color:"#555"}}>₹</span>
                  <input type="number" value={item.editAmt}
                    onChange={e=>setModalItems(p=>p.map((x,j)=>j===i?{...x,editAmt:e.target.value}:x))}
                    style={{background:"#1A1A24",border:"1.5px solid #2A2A38",borderRadius:8,
                      color:item.confirm?"#F0EDE6":"#555",fontSize:14,fontWeight:600,
                      padding:"6px 10px",width:90,outline:"none",textAlign:"right"}}/>
                  <button onClick={()=>setModalItems(p=>p.map((x,j)=>j===i?{...x,payment:x.payment==="CC"?"Cash":"CC"}:x))}
                    style={{background:"none",border:"1px solid #2A2A38",borderRadius:8,
                      color:item.payment==="CC"?"#5A9BE8":"#5AE8A0",fontSize:11,padding:"4px 8px",cursor:"pointer"}}>
                    {item.payment==="CC"?"💳":"💵"}
                  </button>
                </div>
              </div>
            ))}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:20}}>
              <button onClick={async()=>{
                  const now=new Date();
                  const mk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
                  const nc=new Set([...confirmedM,`skipped:${mk}`]);
                  setConfirmedM(nc);
                  await window.storage.set("confirmed_months",JSON.stringify([...nc])).catch(()=>{});
                  setShowModal(false);
                }}
                style={{background:"#1A1A24",border:"1.5px solid #2A2A38",borderRadius:12,
                  color:"#888",fontSize:14,fontWeight:600,padding:14,cursor:"pointer"}}>
                Skip this month
              </button>
              <button onClick={confirmMonth}
                style={{background:"#5AE8A0",border:"none",borderRadius:12,
                  color:"#0F0F13",fontSize:14,fontWeight:700,fontFamily:"'Syne',sans-serif",padding:14,cursor:"pointer"}}>
                ✓ Add {modalItems.filter(i=>i.confirm).length} payments
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0F0F13",borderTop:"1px solid #1A1A22",padding:"6px 0 max(14px,env(safe-area-inset-bottom))"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-around",alignItems:"center"}}>
          <button className={`nav ${view==="dashboard"?"on":""}`} onClick={()=>setView("dashboard")}><span className="ic">◎</span>Dash</button>
          <button className={`nav ${view==="history"?"on":""}`}   onClick={()=>setView("history")}><span className="ic">≡</span>History</button>
          <button onClick={()=>setView("add")} style={{background:"#E8845A",border:"none",borderRadius:"50%",width:52,height:52,fontSize:28,color:"#0F0F13",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-12,boxShadow:"0 4px 20px rgba(232,132,90,.4)",transition:"transform .15s",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>+</button>
          <button className={`nav ${view==="reconcile"?"on":""}`} onClick={()=>setView("reconcile")}><span className="ic">◈</span>Verify</button>
          <button className={`nav ${view==="analytics"?"on":""}`} onClick={()=>{setView("analytics");setAnlView("trends");}}><span className="ic">📊</span>Analytics</button>
          <button className={`nav ${view==="settings"?"on":""}`} onClick={()=>setView("settings")}><span className="ic">⚙</span>Settings</button>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
